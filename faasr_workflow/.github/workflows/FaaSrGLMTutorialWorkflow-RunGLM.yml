name: FaaSrGLMTutorialWorkflow-RunGLM

on:
    workflow_dispatch:
        inputs:
            OVERWRITTEN:
                description: "Overwritten fields"
                required: true
            PAYLOAD_URL:
                description: "URL to payload"
                required: true

jobs:
    run_docker_image:
        runs-on: ubuntu-latest
        container: jessestover/faasr-glm-tutorial:latest

        env:
            GH_PAT: ${{ secrets.GH_PAT}}
            Backblaze_AccessKey: ${{ secrets.Backblaze_AccessKey}}
            Backblaze_SecretKey: ${{ secrets.Backblaze_SecretKey}}
            OVERWRITTEN: ${{ github.event.inputs.OVERWRITTEN }}
            PAYLOAD_URL: ${{ github.event.inputs.PAYLOAD_URL }}

        steps:
          - name: Run Python entrypoint
            run: |
                cd /action
                python3 faasr_entry.py
